<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Remero Terms of Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      var lang = (navigator.language || '').toLowerCase();
      if (lang.startsWith('ko')) {
        window.location.replace('/terms/ko/v1.0/');
      } else {
        window.location.replace('/terms/en/v1.0/');
      }
    })();
  </script>
</head>
<body>
  <main>
    <h1>Remero Terms of Service</h1>
    <ul>
      <li><a href="/terms/en/v1.0/">English</a></li>
      <li><a href="/terms/ko/v1.0/">한국어</a></li>
    </ul>
  </main>
</body>
</html>
